name: Deploy Portfolio

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # pozwala GitHub wydać token OIDC
      contents: read # pozwala czytać repo
        
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: eu-central-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=phoenix-jola-terraform-state-dev" \
            -backend-config="key=portfolio/terraform.tfstate" \
            -backend-config="region=eu-central-1" \
            -backend-config="dynamodb_table=StateLockTerraform" \
            -backend-config="encrypt=true"

      - name: Terraform Apply
        run: terraform apply -auto-approve -var="environment=dev" -var="bucket_name=phoenixcloud-portfolio"